<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Management for Smart Mess - View, add, edit, and manage users.">
  <title>User Management - Smart Mess</title>
  <link rel="stylesheet" href="user management.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="https://via.placeholder.com/32x32/243b7b/ffffff?text=SM" type="image/x-icon">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="Main Navigation">
      <div class="logo">
        <i class="fas fa-utensils"></i> Smart Mess Admin
      </div>
      <nav class="nav-links">
        <a href="admin-dashboard.html">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="user-management.html" class="active" aria-current="page">
          <i class="fas fa-users"></i> User Management
        </a>
        <a href="menu-management.html">
          <i class="fas fa-utensils"></i> Menu Management
        </a>
        <a href="inventory.html">
          <i class="fas fa-boxes"></i> Inventory
        </a>
        <a href="billing-finance.html">
          <i class="fas fa-file-invoice-dollar"></i> Billing & Finance
        </a>
        <a href="reports.html">
          <i class="fas fa-chart-bar"></i> Reports
        </a>
      </nav>
      <div class="logout-link">
        <a href="login1.html" aria-label="Logout" onclick="localStorage.clear();">
          <i class="fas fa-power-off"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" role="main">
      <header class="header">
        <h1>User Management</h1>
        <div class="user-info">
          Welcome, <strong id="admin-name">Admin</strong>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <!-- Controls Section -->
      <section class="controls">
        <div class="search-filter">
          <input type="text" id="searchInput" placeholder="Search by name or email..." aria-label="Search users">
          <select id="statusFilter" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <button class="btn-primary" id="addUserBtn" aria-label="Add new user">
          <i class="fas fa-plus"></i> Add User
        </button>
      </section>

      <!-- User Table -->
      <section class="user-table-section">
        <table class="user-table" id="userTable" aria-label="User management table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Subscription</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Rows will be populated by JavaScript -->
          </tbody>
        </table>
      </section>

      <!-- Modal for Add/Edit User -->
      <div class="modal" id="userModal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-content">
          <span class="close" id="closeModal" aria-label="Close modal">&times;</span>
          <h2 id="modalTitle">Add User</h2>
          <form id="userForm">
            <label for="userName">Name:</label>
            <input type="text" id="userName" required aria-describedby="nameHelp">
            <small id="nameHelp">Enter the full name of the user.</small>

            <label for="userEmail">Email:</label>
            <input type="email" id="userEmail" required aria-describedby="emailHelp">
            <small id="emailHelp">Enter a valid email address.</small>

            <label for="userSubscription">Subscription:</label>
            <select id="userSubscription" required>
              <option value="Basic">Basic</option>
              <option value="Premium">Premium</option>
              <option value="VIP">VIP</option>
            </select>

            <label for="userStatus">Status:</label>
            <select id="userStatus" required>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>

            <button type="submit" class="btn-primary">Save</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    let users = [];
    let editingUserId = null;

    // Load students from backend
    async function loadStudents() {
      const students = await admin.getAllStudents();
      if (students && !students.error) {
        users = students.map(s => ({
          id: s.id,
          name: s.name,
          email: s.email,
          subscription: s.subscription_status,
          status: s.subscription_status
        }));
        renderTable();
      }
    }

    // Render user table
    function renderTable(filteredUsers = users) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      filteredUsers.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.id}</td>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.subscription}</td>
          <td><span class="status ${user.status.toLowerCase()}">${user.status}</span></td>
          <td>
            <button class="btn-secondary edit-btn" data-id="${user.id}" aria-label="Edit user">Edit</button>
            <button class="btn-warning delete-btn" data-id="${user.id}" aria-label="Delete user">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Search and filter
    document.getElementById('searchInput').addEventListener('input', filterUsers);
    document.getElementById('statusFilter').addEventListener('change', filterUsers);

    function filterUsers() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const filtered = users.filter(user =>
        (user.name.toLowerCase().includes(searchTerm) || user.email.toLowerCase().includes(searchTerm)) &&
        (statusFilter === '' || user.status === statusFilter)
      );
      renderTable(filtered);
    }

    // Modal controls
    const modal = document.getElementById('userModal');
    const closeModal = document.getElementById('closeModal');
    const userForm = document.getElementById('userForm');

    document.getElementById('addUserBtn').addEventListener('click', () => {
      editingUserId = null;
      document.getElementById('modalTitle').textContent = 'Add User';
      userForm.reset();
      modal.style.display = 'block';
      modal.setAttribute('aria-hidden', 'false');
    });

    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    });

    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
      }
    });

    // Form submission
    userForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const subscription = document.getElementById('userSubscription').value;
      const status = document.getElementById('userStatus').value;

      if (editingUserId) {
        // Edit existing user
        const user = users.find(u => u.id === editingUserId);
        user.name = name;
        user.email = email;
        user.subscription = subscription;
        user.status = status;
      } else {
        // Add new user
        const newId = users.length ? Math.max(...users.map(u => u.id)) + 1 : 1;
        users.push({ id: newId, name, email, subscription, status });
      }

      renderTable();
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    });

    // Edit and Delete actions
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('edit-btn')) {
        const id = parseInt(e.target.dataset.id);
        const user = users.find(u => u.id === id);
        editingUserId = id;
        document.getElementById('modalTitle').textContent = 'Edit User';
        document.getElementById('userName').value = user.name;
        document.getElementById('userEmail').value = user.email;
        document.getElementById('userSubscription').value = user.subscription;
        document.getElementById('userStatus').value = user.status;
        modal.style.display = 'block';
        modal.setAttribute('aria-hidden', 'false');
      } else if (e.target.classList.contains('delete-btn')) {
        const id = parseInt(e.target.dataset.id);
        if (confirm('Are you sure you want to delete this user?')) {
          users = users.filter(u => u.id !== id);
          renderTable();
        }
      }
    });

    // Initial render
    document.addEventListener('DOMContentLoaded', loadStudents);
  </script>
</body>
</html>
