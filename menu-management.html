<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Menu Management for Smart Mess - View, add, edit, and manage menu items.">
  <title>Menu Management - Smart Mess</title>
  <link rel="stylesheet" href="user management.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="https://via.placeholder.com/32x32/243b7b/ffffff?text=SM" type="image/x-icon">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="Main Navigation">
      <div class="logo">
        <i class="fas fa-utensils"></i> Smart Mess Admin
      </div>
      <nav class="nav-links">
        <a href="admin-dashboard.html">
          <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a href="user-management.html">
          <i class="fas fa-users"></i> User Management
        </a>
        <a href="menu-management.html" class="active" aria-current="page">
          <i class="fas fa-utensils"></i> Menu Management
        </a>
        <a href="inventory.html">
          <i class="fas fa-boxes"></i> Inventory
        </a>
        <a href="billing-finance.html">
          <i class="fas fa-file-invoice-dollar"></i> Billing & Finance
        </a>
        <a href="reports.html">
          <i class="fas fa-chart-bar"></i> Reports
        </a>
      </nav>
      <div class="logout-link">
        <a href="login1.html" aria-label="Logout" onclick="localStorage.clear();">
          <i class="fas fa-power-off"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" role="main">
      <header class="header">
        <h1>Menu Management</h1>
        <div class="user-info">
          Welcome, <strong id="admin-name">Admin</strong>
          <i class="fas fa-user-circle"></i>
        </div>
      </header>

      <!-- Controls Section -->
      <section class="controls">
        <div class="search-filter">
          <input type="text" id="searchInput" placeholder="Search by name or category..." aria-label="Search menu items">
          <select id="availabilityFilter" aria-label="Filter by availability">
            <option value="">All Items</option>
            <option value="Available">Available</option>
            <option value="Unavailable">Unavailable</option>
          </select>
        </div>
        <button class="btn-primary" id="addItemBtn" aria-label="Add new menu item">
          <i class="fas fa-plus"></i> Add Item
        </button>
      </section>

      <!-- Menu Table -->
      <section class="menu-table-section">
        <table class="menu-table" id="menuTable" aria-label="Menu management table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price (₹)</th>
              <th>Availability</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="menuTableBody">
            <!-- Rows will be populated by JavaScript -->
          </tbody>
        </table>
      </section>

      <!-- Modal for Add/Edit Menu Item -->
      <div class="modal" id="menuModal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-content">
          <span class="close" id="closeModal" aria-label="Close modal">&times;</span>
          <h2 id="modalTitle">Add Menu Item</h2>
          <form id="menuForm">
            <label for="itemName">Name:</label>
            <input type="text" id="itemName" required aria-describedby="nameHelp">
            <small id="nameHelp">Enter the name of the menu item.</small>

            <label for="itemCategory">Category:</label>
            <select id="itemCategory" required>
              <option value="Main Course">Main Course</option>
              <option value="Side Dish">Side Dish</option>
              <option value="Beverage">Beverage</option>
              <option value="Dessert">Dessert</option>
            </select>

            <label for="itemPrice">Price (₹):</label>
            <input type="number" id="itemPrice" min="0" step="0.01" required aria-describedby="priceHelp">
            <small id="priceHelp">Enter the price in rupees.</small>

            <label for="itemAvailability">Availability:</label>
            <select id="itemAvailability" required>
              <option value="Available">Available</option>
              <option value="Unavailable">Unavailable</option>
            </select>

            <button type="submit" class="btn-primary">Save</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="api.js"></script>
  <script>
    let menuItems = [];
    let editingItemId = null;

    // Load menu items from backend
    async function loadMenuItems() {
      const items = await menu.getAllMenuItems();
      if (items && !items.error) {
        menuItems = items.map(item => ({
          id: item.id,
          name: item.name,
          category: item.category,
          price: item.price,
          availability: 'Available' // Default
        }));
        renderTable();
      }
    }

    // Render menu table
    function renderTable(filteredItems = menuItems) {
      const tbody = document.getElementById('menuTableBody');
      tbody.innerHTML = '';
      filteredItems.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>${item.category}</td>
          <td>₹${item.price}</td>
          <td><span class="availability ${item.availability.toLowerCase()}">${item.availability}</span></td>
          <td>
            <button class="btn-secondary edit-btn" data-id="${item.id}" aria-label="Edit menu item">Edit</button>
            <button class="btn-warning delete-btn" data-id="${item.id}" aria-label="Delete menu item">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Search and filter
    document.getElementById('searchInput').addEventListener('input', filterItems);
    document.getElementById('availabilityFilter').addEventListener('change', filterItems);

    function filterItems() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const availabilityFilter = document.getElementById('availabilityFilter').value;
      const filtered = menuItems.filter(item =>
        (item.name.toLowerCase().includes(searchTerm) || item.category.toLowerCase().includes(searchTerm)) &&
        (availabilityFilter === '' || item.availability === availabilityFilter)
      );
      renderTable(filtered);
    }

    // Modal controls
    const modal = document.getElementById('menuModal');
    const closeModal = document.getElementById('closeModal');
    const menuForm = document.getElementById('menuForm');

    document.getElementById('addItemBtn').addEventListener('click', () => {
      editingItemId = null;
      document.getElementById('modalTitle').textContent = 'Add Menu Item';
      menuForm.reset();
      modal.style.display = 'block';
      modal.setAttribute('aria-hidden', 'false');
    });

    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    });

    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden', 'true');
      }
    });

    // Form submission
    menuForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('itemName').value;
      const category = document.getElementById('itemCategory').value;
      const price = parseFloat(document.getElementById('itemPrice').value);
      const today = new Date().toISOString().split('T')[0];

      if (editingItemId) {
        // Edit existing item
        const result = await menu.updateMenuItem(editingItemId, { name, category, price, date: today });
        if (result && result.success) {
          await loadMenuItems();
          alert('Menu item updated!');
        } else {
          alert('Error updating menu item');
        }
      } else {
        // Add new item
        const result = await menu.createMenuItem({ name, category, price, date: today, description: '' });
        if (result && result.success) {
          await loadMenuItems();
          alert('Menu item added!');
        } else {
          alert('Error adding menu item');
        }
      }

      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
    });

    // Edit and Delete actions
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('edit-btn')) {
        const id = parseInt(e.target.dataset.id);
        const item = menuItems.find(i => i.id === id);
        editingItemId = id;
        document.getElementById('modalTitle').textContent = 'Edit Menu Item';
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemAvailability').value = item.availability;
        modal.style.display = 'block';
        modal.setAttribute('aria-hidden', 'false');
      } else if (e.target.classList.contains('delete-btn')) {
        const id = parseInt(e.target.dataset.id);
        if (confirm('Are you sure you want to delete this menu item?')) {
          const result = await menu.deleteMenuItem(id);
          if (result && result.success) {
            await loadMenuItems();
            alert('Menu item deleted!');
          } else {
            alert('Error deleting menu item');
          }
        }
      }
    });

    // Initial render
    document.addEventListener('DOMContentLoaded', loadMenuItems);
  </script>
</body>
</html>
