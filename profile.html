<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Profile for Smart Mess - View and edit your account details.">
  <title>Profile - Smart Mess</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
      color: #fff;
      min-height: 100vh;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar - Matching Dashboard */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #11131a 0%, #0a0e1a 100%);
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 122, 26, 0.1);
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #ff7a1a, #ff9a4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 0 20px;
    }

    .nav-links {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 15px;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      padding: 14px 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: rgba(255, 122, 26, 0.1);
      color: #ff7a1a;
      transform: translateX(5px);
    }

    .nav-links a i {
      width: 20px;
      font-size: 1.1rem;
    }

    .logout-link {
      padding: 20px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: auto;
    }

    .logout-link a {
      color: #ff6b6b;
      text-decoration: none;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 10px;
      transition: all 0.3s;
    }

    .logout-link a:hover {
      background: rgba(255, 107, 107, 0.1);
      color: #ff5252;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 30px 40px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(255, 122, 26, 0.2);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #ff9a4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    .user-info strong {
      color: #ff7a1a;
    }

    /* Section */
    .section {
      background: linear-gradient(135deg, #1a1f2e, #11131a);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 122, 26, 0.1);
    }

    .section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section h2 i {
      color: #ff7a1a;
    }

    /* Profile Card */
    .profile-card {
      text-align: center;
      padding: 40px 20px;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, rgba(255, 122, 26, 0.2), rgba(255, 154, 77, 0.1));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(255, 122, 26, 0.3);
    }

    .profile-avatar i {
      font-size: 4rem;
      color: #ff7a1a;
    }

    .profile-card h2 {
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 10px;
    }

    .profile-card p {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .edit-profile-btn {
      background: linear-gradient(135deg, #ff7a1a, #ff9a4d);
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .edit-profile-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 122, 26, 0.4);
    }

    /* Details Grid */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 122, 26, 0.1);
    }

    .detail-item label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .detail-item label i {
      color: #ff7a1a;
    }

    .detail-item span {
      display: block;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Preferences */
    .preferences-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .preference-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 122, 26, 0.1);
    }

    .preference-item label {
      display: block;
      color: #94a3b8;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .preference-item select,
    .preference-item input[type="checkbox"] {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 122, 26, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    .preference-item select:focus {
      outline: none;
      border-color: #ff7a1a;
    }

    .preference-item input[type="checkbox"] {
      width: auto;
      height: 20px;
      width: 20px;
      cursor: pointer;
    }

    .save-preferences-btn {
      background: rgba(255, 122, 26, 0.2);
      color: #ff7a1a;
      border: 1px solid rgba(255, 122, 26, 0.3);
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .save-preferences-btn:hover {
      background: rgba(255, 122, 26, 0.3);
      transform: translateY(-2px);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1f2e, #11131a);
      margin: 10% auto;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(255, 122, 26, 0.2);
      width: 90%;
      max-width: 500px;
      position: relative;
    }

    .close {
      color: #94a3b8;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close:hover {
      color: #ff7a1a;
    }

    .modal-content h2 {
      color: #fff;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 122, 26, 0.2);
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff7a1a;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff7a1a, #ff9a4d);
      color: #fff;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 122, 26, 0.4);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        padding: 20px;
      }
      .details-grid,
      .preferences-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar - Matching Dashboard -->
    <aside class="sidebar">
      <div class="logo">🍽️ Smart Mess</div>
      <nav class="nav-links">
        <a href="student-dashboard.html">
          <i class="fas fa-home"></i> Dashboard
        </a>
        <a href="menu-rating.html">
          <i class="fas fa-utensils"></i> Menu & Rating
        </a>
        <a href="meal-packages.html">
          <i class="fas fa-box"></i> Mess Packages
        </a>
        <a href="billing-payment.html">
          <i class="fas fa-receipt"></i> Billing & Payments
        </a>
        <a href="profile.html" class="active">
          <i class="fas fa-user-circle"></i> Profile
        </a>
      </nav>
      <div class="logout-link">
        <a href="login1.html" onclick="localStorage.clear();">
          <i class="fas fa-power-off"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <h1>My Profile</h1>
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span>Welcome, <strong id="user-name">Student</strong></span>
        </div>
      </header>

      <!-- Profile Card -->
      <section class="section">
        <div class="profile-card">
          <div class="profile-avatar">
            <i class="fas fa-user-circle"></i>
          </div>
          <h2 id="profile-name">Loading...</h2>
          <p id="profile-email">Loading...</p>
          <button class="edit-profile-btn" id="editProfileBtn">
            <i class="fas fa-edit"></i> Edit Profile
          </button>
        </div>
      </section>

      <!-- Profile Details -->
      <section class="section">
        <h2><i class="fas fa-id-card"></i> Account Details</h2>
        <div class="details-grid">
          <div class="detail-item">
            <label><i class="fas fa-id-card"></i> Student ID:</label>
            <span id="profile-id">Loading...</span>
          </div>
          <div class="detail-item">
            <label><i class="fas fa-phone"></i> Phone:</label>
            <span id="profile-phone">Loading...</span>
          </div>
          <div class="detail-item">
            <label><i class="fas fa-map-marker-alt"></i> Address:</label>
            <span id="profile-address">Loading...</span>
          </div>
          <div class="detail-item">
            <label><i class="fas fa-calendar-alt"></i> Joined:</label>
            <span id="profile-joined">Loading...</span>
          </div>
        </div>
      </section>

      <!-- Preferences Section -->
      <section class="section">
        <h2><i class="fas fa-cog"></i> Mess Preferences</h2>
        <div class="preferences-grid">
          <div class="preference-item">
            <label for="dietary">Dietary Restrictions:</label>
            <select id="dietary">
              <option value="none">None</option>
              <option value="vegetarian">Vegetarian</option>
              <option value="vegan">Vegan</option>
              <option value="gluten-free">Gluten-Free</option>
            </select>
          </div>
          <div class="preference-item">
            <label for="notifications">
              <input type="checkbox" id="notifications" checked style="width: auto; margin-right: 10px;">
              Email Notifications
            </label>
          </div>
        </div>
        <button class="save-preferences-btn" id="savePreferencesBtn">
          <i class="fas fa-save"></i> Save Preferences
        </button>
      </section>
    </main>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h2>Edit Profile</h2>
      <form id="editForm">
        <div class="form-group">
          <label for="editName">Name:</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label for="editEmail">Email:</label>
          <input type="email" id="editEmail" required>
        </div>
        <div class="form-group">
          <label for="editPhone">Phone:</label>
          <input type="tel" id="editPhone">
        </div>
        <div class="form-group">
          <label for="editAddress">Address:</label>
          <input type="text" id="editAddress">
        </div>
        <button type="submit" class="btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');

    // Redirect if not logged in
    if (!userId || userRole !== 'student') {
      alert('Please login as a student to access this page.');
      window.location.href = 'login1.html';
    }

    let userProfile = {};

    // Load profile data from backend
    async function loadProfile() {
      try {
        const profile = await student.getProfile(userId);
        if (profile && !profile.error) {
          userProfile = profile;
          document.getElementById('profile-name').textContent = profile.name || 'N/A';
          document.getElementById('profile-email').textContent = profile.email || 'N/A';
          document.getElementById('profile-id').textContent = profile.student_id || 'N/A';
          document.getElementById('profile-phone').textContent = profile.phone || 'N/A';
          document.getElementById('profile-address').textContent = profile.address || 'N/A';
          document.getElementById('user-name').textContent = profile.name || 'Student';
          
          // Set joined date (if available)
          if (profile.enrollment_date) {
            const date = new Date(profile.enrollment_date);
            document.getElementById('profile-joined').textContent = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
          } else {
            document.getElementById('profile-joined').textContent = 'N/A';
          }
        } else {
          alert('Error loading profile. Please try again.');
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        alert('Error loading profile. Please check if the server is running.');
      }
    }

    // Edit profile modal
    document.getElementById('editProfileBtn').addEventListener('click', () => {
      document.getElementById('editName').value = userProfile.name || '';
      document.getElementById('editEmail').value = userProfile.email || '';
      document.getElementById('editPhone').value = userProfile.phone || '';
      document.getElementById('editAddress').value = userProfile.address || '';
      document.getElementById('editModal').style.display = 'block';
    });

    // Form submission
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      try {
        const result = await student.updateProfile(userId, {
          name: document.getElementById('editName').value,
          email: document.getElementById('editEmail').value,
          phone: document.getElementById('editPhone').value,
          address: document.getElementById('editAddress').value
        });
        
        if (result && result.success) {
          await loadProfile();
          alert('✅ Profile updated successfully!');
          document.getElementById('editModal').style.display = 'none';
        } else {
          alert('❌ Error: ' + (result.error || 'Failed to update profile'));
        }
      } catch (error) {
        console.error('Error updating profile:', error);
        alert('❌ Connection error. Please check if the server is running.');
      }
    });

    // Save preferences
    document.getElementById('savePreferencesBtn').addEventListener('click', () => {
      const dietary = document.getElementById('dietary').value;
      const notifications = document.getElementById('notifications').checked;
      alert(`✅ Preferences saved!\nDietary: ${dietary}\nNotifications: ${notifications ? 'On' : 'Off'}`);
    });

    // Modal close
    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('editModal').style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) {
        document.getElementById('editModal').style.display = 'none';
      }
    });

    // Initial load
    document.addEventListener('DOMContentLoaded', async () => {
      await loadProfile();
    });
  </script>
</body>
</html>
